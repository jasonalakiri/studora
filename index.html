<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Studora : a simple study planner for students. Add tasks, track your progress and stay focused with the Pomodoro timer." />
  <meta property="og:title"       content="Studora" />
  <meta property="og:description" content="A simple study planner for students. Add tasks, track your progress and stay focused with the Pomodoro timer." />
  <meta property="og:image"       content="Studora.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
  <meta name="author" content="Jason Alakiri" />
  <title>Studora: Stay Focused</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  <link rel="stylesheet" href="smartstudy.css" />
</head>
<body>
  <div id="topbar">
    <h1>🎓 Studora</h1>

    <button onclick="toggleTheme()"> Dark Mode</button>
  </div>
  <img src="Studora.png"
    id="heroImg"
    alt="image">

 
  <div id="progressArea">
    <p>Tasks completed: <span id="progressText">0 of 0</span></p>
    <div id="progressBar">
      <div id="progressFill"></div>
    </div>
  </div>

  
  <div id="timerBox">
    <h2>⏱ Pomodoro Timer</h2>
    <p id="timerLabel">Study Session = (25 min)</p>
    <div id="timerDisplay">25:00</div>
    <div id="timerButtons">
      <button onclick="startTimer()">▶ Start</button>
      <button onclick="pauseTimer()">⏸ Pause</button>
      <button onclick="resetTimer()"> Reset</button>
    </div>
  </div>

 
  <div id="formBox">
    <h2>➕ Add a Task</h2>
    <input  type="text" id="subjectInput"  placeholder="Subject e.g. Mathematics" /><br/>
    <textarea id="descInput" placeholder="What do you need to do?"></textarea><br/>
    <input  type="date" id="deadlineInput" /><br/>
    <button onclick="addTask()">Add Task</button>
  </div>

  <div id="taskBox">
    <h2>📝 My Tasks</h2>
    <div id="taskList"></div>
  </div>

  <script src="smartstudy.js"></script>
</body>
</html>
